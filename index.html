<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Studio Pro | Sincronización Automática</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/gun/gun.js"></script>
    <style>
        :root { --accent: #0f172a; --primary: #2563eb; --border: #e2e8f0; --text-light: #64748b; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: #f8fafc; color: #1e293b; min-height: 100vh; padding-bottom: 40px; }
        nav { max-width: 1200px; margin: 0 auto; padding: 1.5rem; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-weight: 800; font-size: 1.5rem; color: var(--accent); display: flex; align-items: center; gap: 8px; }
        .container { width: 100%; max-width: 650px; margin: 0 auto; padding: 0 1rem; }
        .card { background: white; padding: 2rem; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); border: 1px solid white; }
        .tabs { display: flex; background: #f1f5f9; padding: 5px; border-radius: 15px; margin-bottom: 1.5rem; }
        .tab-btn { flex: 1; padding: 10px; border: none; border-radius: 12px; cursor: pointer; background: transparent; font-weight: 700; color: var(--text-light); }
        .tab-btn.active { background: white; color: var(--primary); box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .service-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 1.5rem; }
        .service-item { padding: 12px; border: 2px solid var(--border); border-radius: 15px; cursor: pointer; text-align: center; transition: 0.2s; }
        .service-item.selected { border-color: var(--primary); background: #eff6ff; color: var(--primary); }
        .time-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(85px, 1fr)); gap: 8px; margin-top: 10px; }
        .time-chip { padding: 12px; border: 2px solid var(--border); border-radius: 12px; cursor: pointer; text-align: center; font-weight: 700; font-size: 0.85rem; }
        .time-chip.selected { background: var(--accent); color: white; border-color: var(--accent); }
        .time-chip.disabled { background: #f1f5f9; color: #cbd5e1; cursor: not-allowed; text-decoration: line-through; }
        .primary-btn { width: 100%; padding: 16px; background: var(--accent); color: white; border: none; border-radius: 16px; font-weight: 800; cursor: pointer; margin-top: 15px; }
        .form-group { margin-bottom: 1rem; }
        label { display: block; margin-bottom: 5px; font-size: 0.8rem; font-weight: 700; color: var(--text-light); }
        input { width: 100%; padding: 14px; border: 2px solid var(--border); border-radius: 15px; outline: none; }
        .admin-container { max-width: 1000px; display: none; }
        .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 1.5rem; }
        .stat-card { background: white; padding: 20px; border-radius: 20px; text-align: center; border: 1px solid var(--border); }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 15px; overflow: hidden; }
        th { text-align: left; padding: 15px; font-size: 0.7rem; border-bottom: 1px solid var(--border); text-transform: uppercase; }
        td { padding: 15px; border-bottom: 1px solid #f8fafc; font-size: 0.9rem; }
        .hidden { display: none !important; }
        @media print { .no-print { display: none !important; } .card { border: 1px solid #000; box-shadow: none; } }
    </style>
</head>
<body>

    <nav class="no-print">
        <div class="logo"><i data-lucide="scissors"></i> ELITE STUDIO</div>
        <button onclick="showSection('loginView')" style="background:none; border:none; cursor:pointer; font-weight:700; color:var(--text-light)">Acceso Staff</button>
    </nav>

    <div class="container no-print" id="clientView">
        <div class="card">
            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('reserva')">Reservar</button>
                <button class="tab-btn" onclick="switchTab('anular')">Anular</button>
            </div>

            <div id="tab-reserva">
                <div class="service-grid">
                    <div class="service-item" onclick="selServ(this, 'Corte', 15, 40)">Corte <br><small>15€ • 40m</small></div>
                    <div class="service-item" onclick="selServ(this, 'Corte+Barba', 25, 80)">Pack <br><small>25€ • 80m</small></div>
                    <div class="service-item" onclick="selServ(this, 'Tinte', 40, 120)">Tinte <br><small>40€ • 120m</small></div>
                    <div class="service-item" onclick="selServ(this, 'Elite', 60, 160)">Elite <br><small>60€ • 160m</small></div>
                </div>

                <form onsubmit="event.preventDefault(); saveBooking();">
                    <div class="form-group"><label>DNI</label><input type="text" id="dni" required></div>
                    <div class="form-group"><label>Teléfono</label><input type="tel" id="tel" required></div>
                    <div class="form-group"><label>Fecha</label><input type="date" id="date" required onchange="renderHours()"></div>
                    <div class="form-group">
                        <label>Hora (Intervalos 40min)</label>
                        <div id="hGrid" class="time-grid"></div>
                        <input type="hidden" id="selH" required>
                    </div>
                    <button type="submit" class="primary-btn">Confirmar Reserva</button>
                </form>
            </div>

            <div id="tab-anular" class="hidden">
                <input type="text" id="dniSearch" placeholder="Escribe tu DNI">
                <button onclick="findCita()" class="primary-btn">Buscar mi Cita</button>
                <div id="searchRes" style="margin-top:15px"></div>
            </div>
        </div>
    </div>

    <div class="container hidden no-print" id="loginView">
        <div class="card" style="max-width:400px; margin:auto">
            <h2>Acceso Privado</h2>
            <input type="text" id="u" placeholder="user" style="margin-bottom:10px">
            <input type="password" id="p" placeholder="user" style="margin-bottom:10px">
            <button onclick="login()" class="primary-btn">Entrar</button>
        </div>
    </div>

    <div class="container admin-container" id="adminDashboard">
        <div class="stats no-print">
            <div class="stat-card"><span>Citas</span><h3 id="countH">0</h3></div>
            <div class="stat-card"><span>Caja</span><h3 id="cashH">0€</h3></div>
            <div class="stat-card"><span>Siguiente</span><h3 id="nextC">--:--</h3></div>
        </div>
        <div class="card" id="printSection">
            <div style="display:flex; justify-content:space-between; margin-bottom:15px" class="no-print">
                <h3>Agenda Global</h3>
                <div style="display:flex; gap:10px">
                    <input type="date" id="fDate" onchange="renderAdmin()">
                    <button onclick="window.print()" class="primary-btn" style="margin:0; padding:10px">Imprimir</button>
                    <button onclick="showSection('clientView')" class="primary-btn" style="margin:0; padding:10px; background:#f1f5f9; color:#000">X</button>
                </div>
            </div>
            <table>
                <thead><tr><th>Hora</th><th>DNI</th><th>Servicio</th><th class="no-print">Borrar</th></tr></thead>
                <tbody id="aTable"></tbody>
            </table>
        </div>
    </div>

    <script>
        // CONFIGURACIÓN P2P (Sin registro, sin nada)
        const gun = Gun(['https://gun-manhattan.herokuapp.com/gun']);
        const appData = gun.get('salon_elite_2026_oficial'); // Nombre de sala única

        const SLOTS = ["09:00","09:40","10:20","11:00","11:40","12:20","13:00","16:00","16:40","17:20","18:00","18:40","19:20"];
        let citas = {};
        let sServ = { n:'', p:0, d:40 };

        // ESCUCHAR DATOS EN TIEMPO REAL
        appData.map().on((data, id) => {
            if (data) citas[id] = data;
            else delete citas[id];
            renderHours();
            renderAdmin();
        });

        function saveBooking() {
            const h = document.getElementById('selH').value;
            const d = document.getElementById('date').value;
            if(!sServ.n || !h) return alert("Selecciona servicio y hora");

            const id = Math.random().toString(36).substr(2, 9);
            appData.get(id).put({
                dni: document.getElementById('dni').value,
                tel: document.getElementById('tel').value,
                date: d,
                time: h,
                service: sServ.n,
                price: sServ.p,
                duration: sServ.d
            });
            alert("Reserva enviada a todos los dispositivos");
        }

        function renderHours() {
            const date = document.getElementById('date').value;
            const grid = document.getElementById('hGrid');
            if(!grid || !date) return;
            grid.innerHTML = '';

            let blocked = [];
            Object.values(citas).filter(c => c.date === date).forEach(c => {
                let idx = SLOTS.indexOf(c.time);
                for(let i=0; i < (c.duration/40); i++) {
                    if(SLOTS[idx+i]) blocked.push(SLOTS[idx+i]);
                }
            });

            SLOTS.forEach(h => {
                const isB = blocked.includes(h);
                const chip = document.createElement('div');
                chip.className = `time-chip ${isB ? 'disabled' : ''}`;
                chip.textContent = h;
                if(!isB) chip.onclick = () => {
                    document.querySelectorAll('.time-chip').forEach(x => x.classList.remove('selected'));
                    chip.classList.add('selected');
                    document.getElementById('selH').value = h;
                };
                grid.appendChild(chip);
            });
        }

        function renderAdmin() {
            const body = document.getElementById('aTable');
            if(!body) return;
            body.innerHTML = '';
            const filter = document.getElementById('fDate').value;
            
            let list = Object.entries(citas).map(([id, val]) => ({id, ...val}))
                       .filter(c => c.date === filter);
            
            // Stats
            document.getElementById('countH').textContent = list.length;
            document.getElementById('cashH').textContent = list.reduce((a,b)=>a+b.price,0) + "€";
            
            list.sort((a,b)=>a.time.localeCompare(b.time)).forEach(c => {
                body.innerHTML += `<tr>
                    <td><strong>${c.time}</strong></td>
                    <td>${c.dni}</td>
                    <td>${c.service}</td>
                    <td class="no-print"><button onclick="deleteCita('${c.id}')" style="color:red; border:none; background:none; cursor:pointer">X</button></td>
                </tr>`;
            });
        }

        function deleteCita(id) {
            if(confirm("¿Eliminar?")) appData.get(id).put(null);
        }

        function selServ(el, n, p, d) {
            document.querySelectorAll('.service-item').forEach(i => i.classList.remove('selected'));
            el.classList.add('selected');
            sServ = { n, p, d };
            renderHours();
        }

        function login() {
            if(document.getElementById('u').value==='user' && document.getElementById('p').value==='user') {
                showSection('adminDashboard');
                renderAdmin();
            }
        }

        function showSection(id) {
            document.getElementById('clientView').classList.add('hidden');
            document.getElementById('loginView').classList.add('hidden');
            document.getElementById('adminDashboard').classList.add('hidden');
            document.getElementById(id).classList.remove('hidden');
            if(id==='adminDashboard') document.getElementById(id).style.display='block';
        }

        function switchTab(t) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('tab-reserva').classList.toggle('hidden', t!=='reserva');
            document.getElementById('tab-anular').classList.toggle('hidden', t!=='anular');
        }

        function findCita() {
            const dni = document.getElementById('dniSearch').value;
            const c = Object.entries(citas).find(([id, v]) => v.dni === dni);
            const res = document.getElementById('searchRes');
            if(!c) return res.innerHTML = "No encontrada";
            res.innerHTML = `<div class="card" style="background:#f1f5f9">
                <p><strong>${c[1].service}</strong></p>
                <p>${c[1].date} - ${c[1].time}</p>
                <button onclick="deleteCita('${c[0]}')" style="color:red; cursor:pointer">Anular</button>
            </div>`;
        }

        document.getElementById('date').min = new Date().toISOString().split('T')[0];
        document.getElementById('fDate').value = new Date().toISOString().split('T')[0];
        lucide.createIcons();
    </script>
</body>
</html>
